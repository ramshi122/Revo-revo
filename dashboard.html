<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revo Fixer Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#3f51b5,#1e3c72);
    color:white;
}

.header{
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.card{
    background:white;
    color:#333;
    margin:20px;
    padding:20px;
    border-radius:15px;
}

.button{
    background:#2ecc71;
    border:none;
    padding:15px;
    color:white;
    font-size:16px;
    border-radius:10px;
    width:90%;
    margin:20px;
    cursor:pointer;
}

.result-box{
    background:#f1f1f1;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}
.logout{
    background:#e74c3c;
    float:right;
    padding:8px 15px;
    border:none;
    color:white;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
    Revo Fixer
</div>

<div class="card">
    <button class="logout" onclick="logout()">Logout</button>
    <h2>Welcome, User</h2>
</div>

<div class="card">
    <h3>Package Status</h3>
    <p>Premium Package Active</p>
</div>

<button class="button" onclick="generateAI()">🤖 Generate AI Prediction</button>

<div class="card">
    <h3>🤖 AI Prediction Engine</h3>
    <div class="result-box" id="result">
        Click Generate to get prediction...
    </div>
</div>

<script>
const API_URL = "https://revo-revo-production.up.railway.app"; // CHANGE if needed

async function generateAI(){

    const resultBox = document.getElementById("result");
    resultBox.innerHTML = "Generating prediction...";

    try{
        const response = await fetch(API_URL + "/api/openai",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                prompt:"Give crazy time prediction"
            })
        });

        const data = await response.json();

        if(data.result){
            resultBox.innerHTML = "✅ " + data.result;
        }else{
            resultBox.innerHTML = "⚠️ AI response error.";
        }

    }catch(err){
        resultBox.innerHTML = "⚠️ Server connection error.";
    }
}

function logout(){
    window.location.href="index.html";
}
</script>

</body>
</html>
